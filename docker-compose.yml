services:
  whatsapp-scheduler:
    build: .
    container_name: whatsapp-scheduler
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=America/Puerto_Rico
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-string}
      - ADMIN_USER=${ADMIN_USER:-}
      - ADMIN_PASS=${ADMIN_PASS:-}
