name: Build, Push, and Deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'views/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Build Docker image and push to GHCR ──────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: echo "version=$(date -u +'%Y.%m.%d.%H%M')" >> $GITHUB_OUTPUT

      - name: Stamp version into package.json
        run: |
          jq '.version = "${{ steps.version.outputs.version }}"' package.json > package.tmp.json
          mv package.tmp.json package.json
          echo "Version: ${{ steps.version.outputs.version }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export image ref for downstream jobs
        id: image
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT

  # ── 2. Deploy worker to Azure Container Apps ─────────────────────────────────
  # Requires these repository secrets:
  #   AZURE_CREDENTIALS       — service principal JSON (az ad sp create-for-rbac)
  #   AZURE_RESOURCE_GROUP    — resource group where the Container App lives
  #   AZURE_CONTAINER_APP     — Container App name (default: whatsapp-scheduler-worker)
  #   DATABASE_URL            — Neon Postgres connection string
  #   SESSION_SECRET          — Express session secret
  deploy-worker:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP }}
          imageToDeploy: ${{ needs.build-and-push.outputs.image }}

      - name: Set Container App secrets / env vars
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp secret set \
              --name "${{ secrets.AZURE_CONTAINER_APP }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --secrets \
                "database-url=${{ secrets.DATABASE_URL }}" \
                "session-secret=${{ secrets.SESSION_SECRET }}"

            # Set WHATSAPP_PHONE env var if secret exists
            if [ -n "${{ secrets.WHATSAPP_PHONE }}" ]; then
              az containerapp update \
                --name "${{ secrets.AZURE_CONTAINER_APP }}" \
                --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
                --set-env-vars "WHATSAPP_PHONE=${{ secrets.WHATSAPP_PHONE }}"
            fi

      - name: Verify deployment
        uses: azure/CLI@v2
        with:
          inlineScript: |
            STATE=$(az containerapp show \
              --name "${{ secrets.AZURE_CONTAINER_APP }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --query "properties.runningStatus" -o tsv)
            echo "Container App state: $STATE"
            if [ "$STATE" != "Running" ]; then
              echo "⚠️  Container App is not in Running state"
              exit 1
            fi

