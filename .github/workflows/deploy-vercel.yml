name: Deploy to Vercel

# Disabled auto-trigger — Vercel auto-deploys when connected to GitHub directly.
# To enable this workflow, you need a FULL-ACCOUNT Vercel token (not project-scoped).
# See the instructions below.
on:
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────────────────
# RECOMMENDED SETUP (no workflow needed):
#   1. Go to vercel.com → your project → Settings → Git
#   2. Connect your GitHub repo (jmarti326/whatsapp-scheduler)
#   3. Set "Production Branch" to master
#   4. In Settings → Environment Variables, add:
#        DATABASE_URL = your Neon connection string
#        SESSION_SECRET = your session secret
#   5. Vercel auto-deploys on every push to master. Done!
#
# ALTERNATIVE (this workflow):
#   If you want to use GitHub Actions instead of Vercel's built-in Git integration:
#   1. Create a FULL-ACCOUNT token at vercel.com/account/tokens
#      (NOT a project-scoped token — those cannot read project settings)
#   2. Update the VERCEL_TOKEN secret with the full-account token
#   3. Change the trigger above from workflow_dispatch to push/branches:[master]
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"

      - name: Verify deployment
        if: steps.deploy.outputs.url != ''
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/login")
          echo "HTTP status: $STATUS"
          echo "✅ Deploy complete"
