name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

# Required repository secrets:
#   VERCEL_TOKEN        — create at vercel.com/account/tokens
#   VERCEL_ORG_ID       — your team/personal account ID
#                         (run: vercel whoami --token=<token> then check
#                          vercel.com/account → Settings → General → "Your ID")
#   VERCEL_PROJECT_ID   — prj_ImS8xzjL714BVTPq5mTDf4w0eQGq
#
# Required Vercel project env vars (set in Vercel dashboard → Settings → Environment Variables):
#   DATABASE_URL        — Neon Postgres pooler connection string
#   SESSION_SECRET      — random secret (openssl rand -hex 32)

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Create Vercel project config
        run: |
          mkdir -p .vercel
          echo '{
            "orgId": "${{ secrets.VERCEL_ORG_ID }}",
            "projectId": "${{ secrets.VERCEL_PROJECT_ID }}"
          }' > .vercel/project.json

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"

      - name: Verify deployment is healthy
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/login")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (expected 200, got $STATUS)"
            exit 1
          fi
          echo "✅ Health check passed"
