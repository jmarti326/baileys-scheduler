name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

# Required repository secrets:
#   VERCEL_TOKEN        — create at vercel.com/account/tokens
#   VERCEL_ORG_ID       — team ID from vercel.com/[team]/settings
#   VERCEL_PROJECT_ID   — project ID from vercel.com/[team]/[project]/settings

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link project
        run: vercel link --yes --project=$VERCEL_PROJECT_ID --scope=$VERCEL_ORG_ID --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"

      - name: Verify deployment is healthy
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/login")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "⚠️ Health check returned $STATUS (may need env vars set in Vercel dashboard)"
          fi
          echo "✅ Deploy complete"
