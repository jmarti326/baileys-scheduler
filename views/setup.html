<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - IPR Team Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 18px; }
        button, input { min-height: 48px; font-size: 18px; }
        button:focus, input:focus { outline: 3px solid #818cf8; outline-offset: 2px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="bg-gray-800 rounded-xl p-8 shadow-xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold">⛪ IPR Team Scheduler</h1>
                <p class="text-gray-300 text-base mt-3">Welcome! Create your admin account to get started.</p>
            </div>

            <form id="setup-form" class="space-y-5">
                <div>
                    <label for="username" class="block text-base text-gray-300 mb-2 font-medium">Choose a Username</label>
                    <input id="username" type="text" required autofocus
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label for="password" class="block text-base text-gray-300 mb-2 font-medium">Choose a Password (at least 6 characters)</label>
                    <input id="password" type="password" required minlength="6"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label for="password-confirm" class="block text-base text-gray-300 mb-2 font-medium">Type Your Password Again</label>
                    <input id="password-confirm" type="password" required minlength="6"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div id="error-msg" class="text-red-400 text-base font-medium hidden p-3 bg-red-900/30 rounded-lg"></div>
                <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-500 text-white font-semibold py-4 rounded-lg transition text-lg">
                    🚀 Create My Account
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault()
            const username = document.getElementById('username').value.trim()
            const password = document.getElementById('password').value
            const confirm = document.getElementById('password-confirm').value
            const errorEl = document.getElementById('error-msg')
            errorEl.classList.add('hidden')

            if (password !== confirm) {
                errorEl.textContent = 'The passwords do not match. Please try again.'
                errorEl.classList.remove('hidden')
                return
            }

            const res = await fetch('/api/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            const data = await res.json()

            if (data.success) {
                window.location.href = '/login'
            } else {
                errorEl.textContent = data.error || 'Something went wrong. Please try again.'
                errorEl.classList.remove('hidden')
            }
        })
    </script>
</body>
</html>
